            <!-- Plato 1 -->
            <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img 
                src="https://i.blogs.es/bb0cca/bandeja_paisa/450_1000.jpg" 
                class="card-img-top" 
                alt="Bandeja Paisa">
                <div class="card-body">
                <h5 class="card-title">Bandeja Paisa</h5>
                <p class="card-text">
                    Plato tradicional con frijoles, arroz, carne, huevo y aguacate.
                </p>

            </div>
