<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas | Sabores del Campo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet">

  <style>
    .reserva-box {
      max-width: 600px;
      margin: auto;
    }

    .reserva-box:hover {
      transform: scale(1.01);
      transition: 0.3s ease;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="index.html">Sabores del Campo</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservas.html">Reservas</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container mt-5">
    <div class="reserva-box shadow p-4 rounded">

      <h2 class="text-center mb-3">Reserva tu mesa</h2>
      <p class="text-center text-muted mb-4">
        Completa el formulario y te confirmaremos tu reserva.
      </p>

      <form>
        <div class="mb-3">
          <label class="form-label" id="nombre">Nombre completo</label>
          <input type="text" class="form-control" placeholder="Ej: Juan Pérez">
        </div>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="correo@ejemplo.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Fecha de la reserva</label>
          <input type="date" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Hora</label>
          <input type="time" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Número de personas</label>
          <select class="form-select">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5+</option>
          </select>
        </div>

        <div class="d-grid">
          <button 
            type="button" class="btn btn-success btn-lg" onclick="confirmarReserva()">
            Reservar ahora
        </button>
        </div>
      </form>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-success text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-0">© 2026 Sabores del Campo</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
  </script>

  <script>
   
function confirmarReserva() {

    let nombre = document.querySelector('input[type="text"]').value;

    // if (nombre === "") {
    //   alert("Por favor ingrese su nombre");
    //   return;
    // }
    
    let campos = document.querySelectorAll('.form-control');

    for (let i = 0; i < campos.length; i++) {
      if (campos[i].value === "") {
        // alert("Por favor complete todos los campos");
        Swal.fire({
                icon: "error",
                title: "Oops...",
                text: "Por favor complete todos los campos!"
        });
        return;
      }
    }

    let respuesta = confirm("¿Desea confirmar la reserva?");

    if (respuesta) {
      // alert("Gracias " + nombre + ", tu reserva ha sido registrada.");
      Swal.fire({
                title: "Hecho",
                text: "Tu reserva ha sido registrada.",
                icon: "success",
                draggable: true
      });
    } else {
      // alert("Reserva cancelada. Puedes intentarlo nuevamente.");
      Swal.fire({
                title: "Cancelada",
                text: "Reserva cancelada. Puedes intentarlo nuevamente.",
                icon: "success",
                draggable: true
            });
    }
  }
    
</script>  

</body>
</html>
